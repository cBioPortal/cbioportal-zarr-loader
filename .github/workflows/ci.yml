name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-zarrstore:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cbioportal-zarr-loader/zarrstore test

  test-app:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cbioportal-zarr-loader/app test

  test-profiler:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cbioportal-zarr-loader/profiler test

  test-highperformer:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cbioportal-zarr-loader/highperformer test

  build:
    needs: [test-zarrstore, test-app, test-profiler, test-highperformer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build highperformer (deployed to GitHub Pages)
      - run: pnpm --filter @cbioportal-zarr-loader/highperformer build
        env:
          VITE_BASE_URL: /cbioportal-zarr-loader/

      # Build app (kept for reference, not deployed)
      # To switch back: uncomment this block, comment out highperformer build above,
      # and change upload-pages-artifact path to packages/app/dist
      # - run: pnpm --filter @cbioportal-zarr-loader/app build
      #   env:
      #     VITE_BASE_URL: /cbioportal-zarr-loader/
      #     DOCS_BASE_URL: /cbioportal-zarr-loader/docs/
      #     VITE_POSTMESSAGE_ORIGIN: "https://www.cbioportal.org, https://deploy-preview-*--cbioportalfrontend.netlify.app"
      #     VITE_DEFAULT_URL: "https://cbioportal-public-imaging.assets.cbioportal.org/msk_spectrum_tme_2022/zarr/spectrum_all_cells.zarr"
      #     VITE_FEATURE_FLAGS_URL: "https://raw.githubusercontent.com/cBioPortal/cbioportal-zarr-loader/feature/feature-flags/packages/app/feature-flags.json"

      - uses: actions/upload-pages-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: packages/highperformer/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
